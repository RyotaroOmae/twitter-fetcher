name: Daily Tweets

on:
  schedule:
    - cron: '0 22 * * *'  # 毎朝 07:00 JST
  workflow_dispatch:
    inputs:
      no_dedup:
        description: 'Skip seen_tweets.json (re-fetch all tweets)'
        type: boolean
        default: false

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore seen tweets cache
        uses: actions/cache/restore@v4
        with:
          path: seen_tweets.json
          key: seen-tweets-${{ github.run_id }}
          restore-keys: |
            seen-tweets-

      - name: Restore user ID cache
        uses: actions/cache/restore@v4
        with:
          path: user_cache.json
          key: user-cache-${{ github.run_id }}
          restore-keys: |
            user-cache-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate accounts.txt from secret
        run: printf '%s\n' "${{ secrets.ACCOUNTS_TXT }}" > accounts.txt

      - name: Fetch and post tweets
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          OPTS="--include-self-replies"
          [ "${{ inputs.no_dedup }}" = "true" ] && OPTS="$OPTS --no-dedup"
          python post_tweets.py $OPTS

      - name: Save seen tweets cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_tweets.json
          key: seen-tweets-${{ github.run_id }}

      - name: Save user ID cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: user_cache.json
          key: user-cache-${{ github.run_id }}
